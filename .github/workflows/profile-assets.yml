name: Generate Profile Assets

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-assets.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v6

      - name: Create profile assets directory
        run: mkdir -p profile

      - name: Generate GitHub statistics card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: "username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&rank_icon=github&hide_border=true&bg_color=00000000&title_color=00F5FF&text_color=C9D1D9&icon_color=8B5CF6"
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: "username=${{ github.repository_owner }}&layout=compact&langs_count=8&size_weight=0.5&count_weight=0.5&hide_border=true&bg_color=00000000&title_color=00F5FF&text_color=C9D1D9"
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate contribution snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/github-contribution-grid-snake.svg?palette=github-light&color_snake=8B5CF6
            profile/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00F5FF

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg

          if git diff --staged --quiet; then
            echo "No profile asset changes detected."
            exit 0
          fi

          git commit -m "chore: update profile assets"
          git push
